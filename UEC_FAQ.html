<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC - FAQ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .logo {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #a0aec0;
            font-weight: 300;
        }
        
        .faq-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .faq-item:hover {
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.1);
        }
        
        .faq-question {
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .faq-question:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .faq-question h3 {
            font-size: 1.1rem;
            font-weight: 500;
            flex: 1;
            padding-right: 20px;
        }
        
        .faq-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
        }
        
        .btn.playing {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
        }
        
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
            background: rgba(0, 0, 0, 0.2);
        }
        
        .faq-answer.open {
            max-height: 500px;
            padding: 20px 30px 30px;
        }
        
        .faq-answer p {
            color: #cbd5e0;
            line-height: 1.8;
            font-size: 0.95rem;
        }
        
        .faq-answer ul {
            color: #cbd5e0;
            line-height: 1.8;
            font-size: 0.95rem;
            padding-left: 20px;
            margin-top: 10px;
        }
        
        .faq-answer li {
            margin-bottom: 5px;
        }
        
        .icon {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }
        
        .faq-item.active .icon {
            transform: rotate(45deg);
        }
        
        .global-controls {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .global-controls h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #a0aec0;
        }
        
        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
        
        .control-btn.stop {
            background: linear-gradient(135deg, #e53e3e, #c53030);
        }
        
        .control-btn.stop:hover {
            background: linear-gradient(135deg, #c53030, #e53e3e);
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            color: #718096;
            font-size: 0.9rem;
        }
        
        footer a {
            color: #00d4ff;
            text-decoration: none;
        }
        
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        @media (max-width: 600px) {
            .faq-question h3 {
                font-size: 0.95rem;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.75rem;
            }
            .control-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🎓 UEC FAQ</div>
            <p class="subtitle">University of East Capital - Frequently Asked Questions</p>
        </header>
        
        <div class="global-controls">
            <h2>🔊 Audio Controls</h2>
            <div class="control-buttons">
                <button class="control-btn" onclick="playAll()">
                    ▶️ Play All FAQs
                </button>
                <button class="control-btn stop" onclick="stopAudio()">
                    ⏹️ Stop Audio
                </button>
                <button class="control-btn" onclick="pauseAudio()">
                    ⏸️ Pause
                </button>
            </div>
        </div>
        
        <div id="faq-list">
            <!-- FAQ Items will be inserted here -->
        </div>
        
        <footer>
            <p>University of East Capital | <a href="https://www.uec.edu.eg/">www.uec.edu.eg</a></p>
            <p style="margin-top: 10px; opacity: 0.7;">Click ▶️ on any question to hear the answer</p>
        </footer>
    </div>
    
    <script>
        const faqData = [
            {
                question: "What is the University of East Capital?",
                answer: "The University of East Capital (UEC) is a new university established in 2025, located in the New Administrative Capital of Egypt. The university believes that education is not just about gaining knowledge — it's about unlocking your full potential, developing your character, and preparing you to lead in a fast-changing world."
            },
            {
                question: "How many faculties does UEC have?",
                answer: "UEC has 9 cutting-edge faculties: School of Medicine, School of Dentistry, School of Computer Science and Information Technology, School of Pharmacy, School of Physical Therapy, School of Engineering, School of Arts and Design, School of Business and Economics, and School of Mass Communication."
            },
            {
                question: "What are the tuition fees at UEC?",
                answer: "The tuition fees are as follows: For undergraduate programs in the College of Arts and Sciences and School of Business, full-time tuition is 241 dollars per semester, or 141 dollars per credit hour. Graduate programs charge the same rates. Additional fees include a technology fee of 149 dollars per semester and a student activity fee of 99 dollars per semester."
            },
            {
                question: "How do I apply to UEC?",
                answer: "The application process has three steps: First, choose your program from the available 30 plus academic programs. Second, review the specific admission requirements for your chosen program. Third, complete your online application through the university website."
            },
            {
                question: "What makes UEC different from other universities?",
                answer: "UEC offers Global Standards with Local Excellence. Their programs meet international academic benchmarks while addressing regional development needs. They provide Innovative and Interdisciplinary Education with programs spanning 9 cutting-edge faculties. The campus is designed for discovery with smart classrooms, research labs, and creative spaces. They also offer supportive student life including housing, dining, sports, wellness, and counseling."
            },
            {
                question: "Does UEC offer accommodation?",
                answer: "Yes, UEC provides supportive student life facilities including housing and dining services. The university ensures a comfortable, balanced, and empowering student experience."
            },
            {
                question: "What student activities does UEC offer?",
                answer: "UEC offers Cultural Exchange events, Literary Voices celebrations, Bridging Cultures programs with global perspectives, dynamic student clubs and organizations, sports and wellness programs, and counseling services."
            },
            {
                question: "Does UEC have international partnerships?",
                answer: "Yes, UEC has international partnerships as part of their commitment to providing global-standard education while maintaining local excellence."
            },
            {
                question: "What is the admission requirement?",
                answer: "UEC seeks out talented and motivated students who are ready to make an impact and grow within their vibrant academic community. Review specific admission requirements for your chosen program on their website."
            },
            {
                question: "How many academic programs does UEC offer?",
                answer: "UEC offers more than 30 academic programs across its 9 faculties, ranging from Medicine and Engineering to Arts, Business, and Computer Science."
            }
        ];
        
        let currentUtterance = null;
        let isPaused = false;
        let currentButton = null;
        
        function createFAQItems() {
            const container = document.getElementById('faq-list');
            
            faqData.forEach((faq, index) => {
                const item = document.createElement('div');
                item.className = 'faq-item';
                item.id = `faq-${index}`;
                
                item.innerHTML = `
                    <div class="faq-question" onclick="toggleAnswer(${index})">
                        <h3>${index + 1}. ${faq.question}</h3>
                        <div class="faq-actions">
                            <button class="btn" id="btn-${index}" onclick="event.stopPropagation(); playAnswer(${index})">
                                <span class="btn-icon">▶️</span>
                                <span class="btn-text">Play</span>
                            </button>
                            <span class="icon">+</span>
                        </div>
                    </div>
                    <div class="faq-answer" id="answer-${index}">
                        <p>${faq.answer}</p>
                    </div>
                `;
                
                container.appendChild(item);
            });
        }
        
        function toggleAnswer(index) {
            const item = document.getElementById(`faq-${index}`);
            const answer = document.getElementById(`answer-${index}`);
            
            // Close all other answers
            document.querySelectorAll('.faq-item').forEach((otherItem, i) => {
                if (i !== index) {
                    otherItem.classList.remove('active');
                    document.getElementById(`answer-${i}`).classList.remove('open');
                }
            });
            
            // Toggle current
            item.classList.toggle('active');
            answer.classList.toggle('open');
        }
        
        function playAnswer(index) {
            const faq = faqData[index];
            const button = document.getElementById(`btn-${index}`);
            const btnText = button.querySelector('.btn-text');
            const btnIcon = button.querySelector('.btn-icon');
            
            // Stop any current audio
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            
            // If this button is already playing, stop it
            if (currentButton === button && !isPaused) {
                window.speechSynthesis.cancel();
                btnText.textContent = 'Play';
                btnIcon.textContent = '▶️';
                button.classList.remove('playing');
                currentButton = null;
                return;
            }
            
            // Resume if paused
            if (isPaused && currentButton === button) {
                window.speechSynthesis.resume();
                isPaused = false;
                btnText.textContent = 'Stop';
                btnIcon.textContent = '⏹️';
                button.classList.add('playing');
                return;
            }
            
            // Start new utterance
            currentButton = button;
            isPaused = false;
            
            currentUtterance = new SpeechSynthesisUtterance(faq.question + '. ' + faq.answer);
            currentUtterance.rate = 0.95;
            currentUtterance.pitch = 1;
            currentUtterance.volume = 1;
            
            // Get available voices and pick an English one
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
            if (englishVoice) {
                currentUtterance.voice = englishVoice;
            }
            
            currentUtterance.onend = () => {
                btnText.textContent = 'Play';
                btnIcon.textContent = '▶️';
                button.classList.remove('playing');
                currentButton = null;
            };
            
            currentUtterance.onerror = () => {
                btnText.textContent = 'Play';
                btnIcon.textContent = '▶️';
                button.classList.remove('playing');
                currentButton = null;
            };
            
            // Update button state
            btnText.textContent = 'Stop';
            btnIcon.textContent = '⏹️';
            button.classList.add('playing');
            
            // Open the answer if closed
            const item = document.getElementById(`faq-${index}`);
            const answer = document.getElementById(`answer-${index}`);
            item.classList.add('active');
            answer.classList.add('open');
            
            window.speechSynthesis.speak(currentUtterance);
        }
        
        function playAll() {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            
            let fullText = '';
            faqData.forEach((faq, index) => {
                fullText += `Question ${index + 1}: ${faq.question}. Answer: ${faq.answer}. `;
            });
            
            currentUtterance = new SpeechSynthesisUtterance(fullText);
            currentUtterance.rate = 0.9;
            currentUtterance.pitch = 1;
            
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
            if (englishVoice) {
                currentUtterance.voice = englishVoice;
            }
            
            window.speechSynthesis.speak(currentUtterance);
        }
        
        function stopAudio() {
            window.speechSynthesis.cancel();
            isPaused = false;
            
            // Reset all buttons
            document.querySelectorAll('.btn').forEach(btn => {
                btn.classList.remove('playing');
                btn.querySelector('.btn-text').textContent = 'Play';
                btn.querySelector('.btn-icon').textContent = '▶️';
            });
            currentButton = null;
        }
        
        function pauseAudio() {
            if (window.speechSynthesis.speaking && !isPaused) {
                window.speechSynthesis.pause();
                isPaused = true;
            } else if (isPaused) {
                window.speechSynthesis.resume();
                isPaused = false;
            }
        }
        
        // Initialize voices
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                console.log('Voices loaded:', speechSynthesis.getVoices().length);
            };
        }
        
        // Create FAQ items on load
        createFAQItems();
    </script>
</body>
</html>
